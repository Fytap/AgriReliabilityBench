experiments:
  - name: cropandweed_to_cropandweed
    train_dataset: cropandweed
    test_dataset: cropandweed
    domain: in_domain
  - name: cropandweed_to_phenobench
    train_dataset: cropandweed
    test_dataset: phenobench
    domain: external
  - name: phenobench_to_phenobench
    train_dataset: phenobench
    test_dataset: phenobench
    domain: in_domain
